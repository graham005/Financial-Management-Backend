

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: financial-backend-prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Internal connection string pointing to our mssql container service name
      - ConnectionStrings__DefaultConnection=Server=mssql-db,1433;Initial Catalog=FinancialManagementDb;User ID=sa;Password=${DB_PASSWORD};Encrypt=True;TrustServerCertificate=True;MultipleActiveResultSets=False;
      - JwtConfig__Key=${JWT_SECRET_KEY}
      - JwtConfig__Issuer=${JWT_ISSUER}
      - JwtConfig__Audience=${JWT_AUDIENCE}
      - JwtConfig__ExpireTime=${JWT_EXPIRE_MINUTES}
      - JwtConfig__RefreshTokenValidityMins=${JWT_REFRESH_EXPIRE_MINUTES}
    ports:
      - "5000:8080"
    networks:
      - financial-network
    restart: always
    volumes:
      - app-logs:/app/logs
      - app-data:/app/data
    depends_on:
      - mssql-db

  mssql-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: financial-mssql-prod
    user: root # Explicit root access ensures the container can write to mounted volumes
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${DB_PASSWORD}
      - MSSQL_PID=Express # Free version for production workloads under 10GB
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - financial-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: financial-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - financial-network
    restart: always

networks:
  financial-network:
    driver: bridge

volumes:
  app-logs:
  app-data:
  mssql-data: # Vital: This saves your actual SQL data on your host/disk